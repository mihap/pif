<article class="border border-base-300 bg-base-100" data-example-type="{{exampleType}}">

    <h3 class="text-base font-semibold">{{exampleTitle}}</h3>
    <p class="mt-1 text-sm leading-6 text-base-content/65">{{exampleDescription}}</p>
    {{tokenChips}}

    {{exampleBody}}
  </div>
</article>
